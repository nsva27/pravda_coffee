<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="css/index.css">
        <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,700&display=swap" rel="stylesheet">
        <title>Nauchny coffe</title>
    </head>
    <body>
        <header class="header">
            <div class="container">
                <div class="header__wrapper">
                    <a class="header__logo" href="#">
                        <img  class="header__logo-img" src="img/logo_white.png" alt="pravda coffee">
                    </a>
                    <nav class="nav">
                        <a class="nav-item header__nav-item" href="#">Меню</a>
                        <a class="nav-item header__nav-item" href="#">Галерея</a>
                        <a class="nav-item header__nav-item" href="#">О нас</a>
                        <a class="nav-item header__nav-item" href="#">Контакты</a>
                        <a class="nav-item header__nav-item header__nav-item_checked" href="#">Акции</a>
                    </nav>
                    <img class="header__shopping-cart" src="img/icons/shopping_cart.svg" alt="shopping cart">
                </div>
            </div>
        </header>
        <!-- /header -->
        <main class="main">
            <div class="container">
                <div class="main__wrapper">
                    <div class="main__offer">
                        <h1 class="main__offer-text">
                            Вкусный кофе <br> каждый день!
                        </h1>
                        <a class="main__btn btn" href="#">Подробнее</a> 
                    </div>       
                </div>
            </div> 
        </main>
        <!-- /main -->
        <section class="menu">
            <div class="container">
                <div class="menu__wrapper">
                    <h2 class="menu__title">Меню</h2>
                    <nav class="nav">
                        <a class="nav-item menu__nav-item" href="#">Классика</a>
                        <a class="nav-item menu__nav-item" href="#">Авторское</a>
                        <a class="nav-item menu__nav-item" href="#">Раф</a>
                        <a class="nav-item menu__nav-item" href="#">Фреш</a>
                        <a class="nav-item menu__nav-item menu__nav-item_checked" href="#">Сезонное</a>
                    </nav>
                </div>
            </div>
        </section>
        <!-- /menu -->
        <div style="padding-top: 100px; margin: 200px 0; text-align: center; background-color: bisque; height: 300px;">
            DIV for some space
            <a class="btn">Button</a>
        </div>
        

        <script src="js/script.js"></script>
    </body>
</html>
