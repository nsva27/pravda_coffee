<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="css/style.css">
        <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,700&display=swap" rel="stylesheet">
        <title>Nauchny coffe</title>
    </head>
    <body>
        <header class="header">
            <div class="container">
                <div class="header__wrapper">
                    <div class="header__logo">
                        <a href="#" class="header__logo-link">
                            <img  class="header__logo-img" src="img/logo_white.png" alt="pravda coffee">
                        </a>
                    </div>
                    <div class="header__nav">
                        <a class="header__nav-item" href="#">Меню</a>
                        <a class="header__nav-item" href="#">Галерея</a>
                        <a class="header__nav-item" href="#">О нас</a>
                        <a class="header__nav-item" href="#">Контакты</a>
                        <a class="header__nav-item header__nav-item_checked" href="#">Акции</a>
                    </div>
                    <div class="header__cart">
                        <img class="header__cart-img" src="img/shopping_cart.svg" alt="shopping cart">
                    </div>
                </div>
            </div>
        </header>
        <!-- /header -->
        <main class="main">
            <div class="container">
                <div class="main__wrapper">
                    <div class="main__offer">
                        <p class="main__offer-text">
                            Вкусный кофе <br> каждый день!
                        </p>
                        <a href="#" class="main__btn btn">Подробнее</a> 
                    </div>       
                </div>
            </div> 
        </main>
        <div style="margin: 300px 0; text-align: center;">
            DIV for some space
        </div>
        

        <script src="js/script.js"></script>
    </body>
</html>
